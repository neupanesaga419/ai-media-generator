<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AI Image Studio{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#f0f5ff',
                            100: '#e0eaff',
                            500: '#6366f1',
                            600: '#4f46e5',
                            700: '#4338ca',
                            900: '#312e81',
                        },
                    }
                }
            }
        }
    </script>
    {% block extra_head %}{% endblock %}
</head>
<body class="h-full bg-gray-950 text-gray-100">

<nav class="bg-gray-900 border-b border-gray-800">
    <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
        <div class="flex h-16 items-center justify-between">
            <a href="{% url 'home' %}" class="text-xl font-bold text-brand-500">AI Image Studio</a>
            <div class="flex gap-4">
                <a href="{% url 'imageapp:generate' %}" class="px-3 py-2 rounded-md text-sm font-medium text-gray-300 hover:text-white hover:bg-gray-800">Generate</a>
                <a href="{% url 'imageapp:gallery' %}" class="px-3 py-2 rounded-md text-sm font-medium text-gray-300 hover:text-white hover:bg-gray-800">Gallery</a>
            </div>
        </div>
    </div>
</nav>

{% if messages %}
<div class="mx-auto max-w-7xl px-4 pt-4">
    {% for message in messages %}
    <div class="mb-2 rounded-md p-3 text-sm
        {% if message.tags == 'error' %}bg-red-900/50 text-red-300
        {% elif message.tags == 'success' %}bg-green-900/50 text-green-300
        {% else %}bg-blue-900/50 text-blue-300{% endif %}">
        {{ message }}
    </div>
    {% endfor %}
</div>
{% endif %}

<main class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8 py-8">
    {% block content %}{% endblock %}
</main>

{% block extra_scripts %}{% endblock %}
</body>
</html>
